<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="180" height="180">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6E56CF" />
      <stop offset="100%" stop-color="#D97757" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer glowing background -->
  <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#brand-grad)" filter="url(#shadow)" />
  
  <!-- Inner dark plate for contrast -->
  <rect x="26" y="26" width="148" height="148" rx="34" fill="#0d1117" />
  
  <!-- Stylized Marketplace Plugin Icon (Plug & Socket Connection) -->
  <g transform="translate(50, 50)">
    <!-- Socket Plate -->
    <rect x="25" y="20" width="50" height="50" rx="10" fill="url(#brand-grad)" opacity="0.15" />
    <rect x="30" y="25" width="40" height="40" rx="8" fill="none" stroke="url(#brand-grad)" stroke-width="3" />
    
    <!-- Plug connection lines -->
    <path d="M10 45 L35 45" stroke="url(#brand-grad)" stroke-width="4" stroke-linecap="round" />
    <path d="M90 45 L65 45" stroke="url(#brand-grad)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Central connection node -->
    <circle cx="50" cy="45" r="10" fill="url(#brand-grad)" />
    <circle cx="50" cy="45" r="4" fill="#0d1117" />
  </g>
</svg>
